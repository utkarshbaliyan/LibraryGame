<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Library — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #080810;
      --panel:  #0f0f1e;
      --panel2: #141428;
      --border: rgba(74,222,128,0.14);
      --accent: #4ade80;
      --gold:   #f59e0b;
      --silver: #94a3b8;
      --bronze: #cd7c3b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --dim:    #475569;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      font-family:'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 3px,
          rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    }

    /* ── Nav ── */
    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; height:52px;
      background:rgba(8,8,16,.96);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .nav-logo {
      font-family:'Space Mono',monospace;
      font-size:13px; font-weight:700; letter-spacing:.22em;
      color:var(--accent);
      text-decoration:none;
    }
    .nav-links { display:flex; gap:8px; }
    .nav-link {
      font-family:'Space Mono',monospace;
      font-size:11px; padding:5px 14px;
      border:1px solid var(--border); border-radius:4px;
      color:var(--dim); text-decoration:none;
      transition:border-color .15s, color .15s;
    }
    .nav-link:hover, .nav-link.active { border-color:var(--accent); color:var(--accent); }

    /* ── Main ── */
    main {
      flex:1; max-width:860px; width:100%;
      margin:0 auto; padding:44px 32px 64px;
    }

    /* ── Header ── */
    .page-label {
      font-family:'Space Mono',monospace;
      font-size:10px; letter-spacing:.22em;
      text-transform:uppercase; color:var(--accent);
      margin-bottom:8px;
    }
    .page-title {
      font-size:30px; font-weight:700; letter-spacing:-.02em;
      margin-bottom:6px;
    }
    .page-sub {
      font-size:14px; color:var(--muted);
      display:flex; align-items:center; gap:16px;
      flex-wrap:wrap; margin-bottom:40px; margin-top:4px;
    }
    #week-label { font-family:'Space Mono',monospace; font-size:12px; color:var(--dim); }
    #reset-cd {
      font-family:'Space Mono',monospace; font-size:12px;
      color:var(--gold);
    }

    /* ── Empty / error states ── */
    .state-box {
      text-align:center; padding:72px 0;
      font-family:'Space Mono',monospace;
      font-size:12px; color:var(--dim); letter-spacing:.08em;
    }

    /* ── Table ── */
    .board {
      display:flex; flex-direction:column; gap:6px;
    }

    .row {
      display:grid;
      grid-template-columns: 52px 1fr 160px 120px;
      align-items:center;
      gap:12px;
      padding:14px 20px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:8px;
      transition:border-color .15s;
      position:relative;
      overflow:hidden;
    }
    .row::before {
      content:'';
      position:absolute; top:0; left:0; bottom:0;
      width:3px;
      background: var(--row-color, transparent);
    }

    .row.rank-1 { --row-color: var(--gold);   border-color: rgba(245,158,11,.3); }
    .row.rank-2 { --row-color: var(--silver); border-color: rgba(148,163,184,.2); }
    .row.rank-3 { --row-color: var(--bronze); border-color: rgba(205,124,59,.2); }
    .row.is-me  { border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.04); }

    .row-rank {
      font-family:'Space Mono',monospace;
      font-size:16px; font-weight:700;
      text-align:center;
      color:var(--dim);
    }
    .rank-1 .row-rank { color:var(--gold); }
    .rank-2 .row-rank { color:var(--silver); }
    .rank-3 .row-rank { color:var(--bronze); }
    .is-me .row-rank  { color:var(--accent); }

    .row-name {
      font-size:15px; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .is-me .row-name { color:var(--accent); }
    .row-name-sub {
      font-size:12px; color:var(--dim);
      margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .row-bar {
      height:6px; background:rgba(255,255,255,.07);
      border-radius:3px; overflow:hidden;
    }
    .row-bar-fill {
      height:100%; border-radius:3px;
      background:var(--row-color, var(--accent));
      transition:width .4s;
    }
    .rank-1 .row-bar-fill { background:var(--gold); }
    .rank-2 .row-bar-fill { background:var(--silver); }
    .rank-3 .row-bar-fill { background:var(--bronze); }
    .is-me  .row-bar-fill { background:var(--accent); }

    .row-time {
      font-family:'Space Mono',monospace;
      font-size:16px; font-weight:700;
      text-align:right;
      color:var(--text);
    }
    .rank-1 .row-time { color:var(--gold); }
    .rank-2 .row-time { color:var(--silver); }
    .rank-3 .row-time { color:var(--bronze); }
    .is-me  .row-time { color:var(--accent); }

    /* ── Your rank panel (if not on board) ── */
    #your-rank {
      display:none;
      margin-top:20px;
      padding:16px 20px;
      background:rgba(74,222,128,.04);
      border:1px solid rgba(74,222,128,.25);
      border-radius:8px;
      font-size:14px; color:var(--muted);
      text-align:center;
    }
    #your-rank.visible { display:block; }
    #your-rank strong { color:var(--accent); font-family:'Space Mono',monospace; }

    /* ── Status bar ── */
    #status-bar {
      padding:7px 32px;
      background:rgba(8,8,16,.92);
      border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      font-family:'Space Mono',monospace;
      font-size:10px; color:var(--dim); letter-spacing:.08em;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">STUDY LIBRARY</a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link">LOBBY</a>
    <a href="leaderboard.html" class="nav-link active">RANKINGS</a>
    <a href="profile.html"     class="nav-link">PROFILE</a>
    <a href="game.html"        class="nav-link">LIBRARY</a>
  </div>
</nav>

<main>
  <div class="page-label">// Weekly Leaderboard</div>
  <div class="page-title">Top Grinders</div>
  <div class="page-sub">
    <span id="week-label">—</span>
    <span>Resets in <span id="reset-cd">—</span></span>
  </div>

  <div id="board-wrap">
    <div class="state-box" id="loading-state">LOADING…</div>
    <div class="board" id="board"></div>
    <div id="your-rank"></div>
  </div>
</main>

<div id="status-bar">
  <span>WEEKLY STUDY RANKINGS</span>
  <span id="last-updated">—</span>
</div>

<script>
'use strict';

const API      = 'http://localhost:2567/leaderboard';
const MY_NAME  = localStorage.getItem('sl_name') || '';

// ── Time helpers ──────────────────────────────────────────────────────────
function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'h ' + String(m).padStart(2,'0') + 'm';
  return m > 0 ? m + 'm' : '< 1m';
}

// ── ISO week label ────────────────────────────────────────────────────────
function isoWeekLabel() {
  const now = new Date();
  const d   = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yr  = d.getUTCFullYear();
  const w   = Math.ceil(((d.getTime() - new Date(Date.UTC(yr,0,1)).getTime()) / 86400000 + 1) / 7);
  return `Week ${w}, ${yr}`;
}

// ── Reset countdown ───────────────────────────────────────────────────────
function resetCountdown() {
  const now    = new Date();
  const next   = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  const toMon  = (8 - next.getUTCDay()) % 7 || 7;
  next.setUTCDate(next.getUTCDate() + toMon);
  const diff   = next.getTime() - now.getTime();
  const d      = Math.floor(diff / 86400000);
  const h      = Math.floor((diff % 86400000) / 3600000);
  const m      = Math.floor((diff % 3600000) / 60000);
  return `${d}d ${h}h ${m}m`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(rows) {
  document.getElementById('loading-state').style.display = 'none';
  const board    = document.getElementById('board');
  const yourRank = document.getElementById('your-rank');
  board.innerHTML = '';
  yourRank.classList.remove('visible');

  if (rows.length === 0) {
    board.innerHTML = '<div class="state-box">NO SESSIONS THIS WEEK YET — START STUDYING</div>';
    return;
  }

  const top1Secs = rows[0].weekly_secs;
  let meOnBoard  = false;

  rows.forEach((entry, i) => {
    const rank    = i + 1;
    const isMe    = entry.name === MY_NAME;
    const pct     = top1Secs > 0 ? (entry.weekly_secs / top1Secs * 100).toFixed(1) : 0;
    if (isMe) meOnBoard = true;

    const row = document.createElement('div');
    row.className = 'row' +
      (rank === 1 ? ' rank-1' : rank === 2 ? ' rank-2' : rank === 3 ? ' rank-3' : '') +
      (isMe ? ' is-me' : '');

    const rankLabel = rank === 1 ? '#1' : rank === 2 ? '#2' : rank === 3 ? '#3' : '#' + rank;
    const goal = entry.goal ? entry.goal.slice(0, 60) : '';

    row.innerHTML = `
      <div class="row-rank">${rankLabel}</div>
      <div>
        <div class="row-name">${entry.name}${isMe ? ' ← you' : ''}</div>
        ${goal ? `<div class="row-name-sub">${goal}</div>` : ''}
      </div>
      <div class="row-bar">
        <div class="row-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="row-time">${fmtTime(entry.weekly_secs)}</div>
    `;
    board.appendChild(row);
  });

  if (MY_NAME && !meOnBoard) {
    yourRank.classList.add('visible');
    yourRank.innerHTML = `You (<strong>${MY_NAME}</strong>) are not on the board yet this week. ` +
      `Study for at least 1 minute to appear.`;
  }
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res  = await fetch(API);
    const rows = await res.json();
    render(Array.isArray(rows) ? rows : []);
    document.getElementById('last-updated').textContent =
      'UPDATED ' + new Date().toLocaleTimeString();
  } catch {
    document.getElementById('loading-state').textContent = 'SERVER OFFLINE';
    document.getElementById('loading-state').style.display = 'block';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
document.getElementById('week-label').textContent = isoWeekLabel();

function tick() { document.getElementById('reset-cd').textContent = resetCountdown(); }
tick();
setInterval(tick, 60000);

load();
setInterval(load, 30000);
</script>

</body>
</html>
