<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Library — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080810;
      --panel:   #0f0f1e;
      --panel2:  #141428;
      --border:  rgba(74,222,128,0.14);
      --hi:      rgba(74,222,128,0.45);
      --accent:  #4ade80;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --dim:     #475569;
      --red:     #f87171;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      font-family:'Space Grotesk', system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 3px,
          rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    }

    /* ── Nav ── */
    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; height:52px;
      background:rgba(8,8,16,.96);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .nav-logo {
      font-family:'Space Mono',monospace;
      font-size:13px; font-weight:700; letter-spacing:.22em;
      color:var(--accent); text-decoration:none;
    }
    .nav-links { display:flex; gap:8px; }
    .nav-link {
      font-family:'Space Mono',monospace;
      font-size:11px; padding:5px 14px;
      border:1px solid var(--border); border-radius:4px;
      color:var(--dim); text-decoration:none;
      transition:border-color .15s, color .15s;
    }
    .nav-link:hover, .nav-link.active { border-color:var(--accent); color:var(--accent); }

    /* ── Main grid ── */
    main {
      flex:1; max-width:920px; width:100%;
      margin:0 auto; padding:44px 32px 64px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-items:start;
    }

    @media (max-width:700px) {
      main { grid-template-columns:1fr; }
    }

    /* ── Card ── */
    .card {
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:28px 28px 24px;
    }

    .card-label {
      font-family:'Space Mono',monospace;
      font-size:10px; letter-spacing:.2em;
      text-transform:uppercase; color:var(--accent);
      margin-bottom:20px;
    }

    /* ── Identity card ── */
    .identity-icon {
      width:52px; height:52px;
      border-radius:50%;
      background:rgba(74,222,128,.12);
      border:2px solid rgba(74,222,128,.3);
      display:grid; place-items:center;
      font-family:'Space Mono',monospace;
      font-size:22px; color:var(--accent);
      margin-bottom:20px;
    }

    /* ── Form fields ── */
    .field { margin-bottom:18px; }

    .field label {
      display:block;
      font-size:12px; font-weight:600;
      color:var(--muted); letter-spacing:.04em;
      margin-bottom:6px;
    }

    .field input, .field textarea {
      width:100%;
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:6px;
      padding:10px 14px;
      font-family:inherit; font-size:14px;
      color:var(--text); outline:none; resize:vertical;
      transition:border-color .18s, box-shadow .18s;
    }
    .field input::placeholder, .field textarea::placeholder { color:var(--dim); }
    .field input:focus, .field textarea:focus {
      border-color:rgba(74,222,128,.5);
      box-shadow:0 0 0 3px rgba(74,222,128,.07);
    }
    .field input.err { border-color:var(--red); }

    .field-hint {
      display:flex; justify-content:space-between;
      margin-top:4px; font-size:11px; color:var(--dim);
    }

    .field-error {
      font-size:11px; color:var(--red);
      margin-top:4px; display:none;
    }
    .field-error.visible { display:block; }

    textarea { min-height:80px; }

    /* ── Save button ── */
    .btn-save {
      width:100%; padding:12px;
      background:var(--accent); color:#080810;
      font-family:'Space Mono',monospace;
      font-size:12px; font-weight:700; letter-spacing:.1em;
      border:none; border-radius:6px; cursor:pointer;
      transition:background .15s, transform .15s;
      margin-top:4px;
    }
    .btn-save:hover { background:#86efac; transform:translateY(-1px); }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* ── Success toast ── */
    #toast {
      display:none;
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:rgba(74,222,128,.15);
      border:1px solid rgba(74,222,128,.4);
      border-radius:8px;
      padding:12px 28px;
      font-family:'Space Mono',monospace;
      font-size:12px; color:var(--accent);
      letter-spacing:.06em;
      z-index:200;
    }
    #toast.visible { display:block; animation:fadeInOut 2.5s ease forwards; }
    @keyframes fadeInOut {
      0%   { opacity:0; transform:translateX(-50%) translateY(8px); }
      15%  { opacity:1; transform:translateX(-50%) translateY(0); }
      75%  { opacity:1; }
      100% { opacity:0; }
    }

    /* ── Stats card ── */
    .stats-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:12px; margin-bottom:0;
    }

    .stat-box {
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:8px;
      padding:16px 14px;
    }

    .stat-val {
      font-family:'Space Mono',monospace;
      font-size:22px; font-weight:700;
      color:var(--accent); line-height:1;
      margin-bottom:4px;
    }
    .stat-label {
      font-size:11px; color:var(--dim);
      letter-spacing:.06em; text-transform:uppercase;
    }

    .stat-box.full-width { grid-column:1/-1; }

    /* ── Member since ── */
    .member-since {
      margin-top:20px;
      font-family:'Space Mono',monospace;
      font-size:11px; color:var(--dim);
      letter-spacing:.06em;
    }

    /* ── Goal display (read view) ── */
    .goal-display {
      background:rgba(74,222,128,.05);
      border:1px solid rgba(74,222,128,.15);
      border-radius:6px;
      padding:14px;
      font-size:14px; color:var(--text);
      line-height:1.6;
      font-style:italic;
      min-height:60px;
    }
    .goal-display.empty { color:var(--dim); font-style:normal; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">STUDY LIBRARY</a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link">LOBBY</a>
    <a href="leaderboard.html" class="nav-link">RANKINGS</a>
    <a href="profile.html"     class="nav-link active">PROFILE</a>
    <a href="game.html"        class="nav-link">LIBRARY</a>
  </div>
</nav>

<main>

  <!-- ── Left: Edit form ── -->
  <div class="card" id="edit-card">
    <div class="card-label">// My Identity</div>

    <div class="identity-icon" id="avatar-icon">[~]</div>

    <div class="field">
      <label>Display name</label>
      <input type="text" id="input-name" maxlength="24" autocomplete="off" spellcheck="false" placeholder="Your name">
      <div class="field-hint">
        <span>2–24 characters</span>
        <span id="name-count">0/24</span>
      </div>
      <div class="field-error" id="name-err">Name must be 2–24 characters.</div>
      <div class="field-error" id="name-taken">This name is already taken.</div>
    </div>

    <div class="field">
      <label>My goal <span style="color:var(--dim);font-weight:400">(what are you working toward?)</span></label>
      <textarea id="input-goal" maxlength="200"
        placeholder="e.g. Clear UPSC Prelims 2026, Get into IIT Bombay CSE…" rows="3"></textarea>
      <div class="field-hint">
        <span></span>
        <span id="goal-count">0/200</span>
      </div>
    </div>

    <div class="field">
      <label>About me</label>
      <textarea id="input-bio" maxlength="300"
        placeholder="A little about yourself — your prep stage, city, motivation…" rows="3"></textarea>
      <div class="field-hint">
        <span></span>
        <span id="bio-count">0/300</span>
      </div>
    </div>

    <button class="btn-save" id="btn-save">SAVE CHANGES</button>

    <div class="member-since" id="member-since"></div>
  </div>

  <!-- ── Right: Stats ── -->
  <div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-label">// Study Stats</div>
      <div class="stats-grid">
        <div class="stat-box full-width">
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-label">Total hours studied</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-weekly">—</div>
          <div class="stat-label">This week</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-sessions">—</div>
          <div class="stat-label">Sessions</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">// My Goal</div>
      <div class="goal-display empty" id="goal-preview">
        No goal set yet. Add one in the form →
      </div>
    </div>
  </div>

</main>

<div id="toast">✓ &nbsp;PROFILE SAVED</div>

<script>
'use strict';

const API_GET = name => `http://localhost:2567/profile/${encodeURIComponent(name)}`;
const API_PUT = 'http://localhost:2567/profile';

let MY_NAME = localStorage.getItem('sl_name');
if (!MY_NAME) { window.location.replace('details.html'); throw new Error(); }

// ── refs ──────────────────────────────────────────────────────────────────
const inputName    = document.getElementById('input-name');
const inputGoal    = document.getElementById('input-goal');
const inputBio     = document.getElementById('input-bio');
const nameCount    = document.getElementById('name-count');
const goalCount    = document.getElementById('goal-count');
const bioCount     = document.getElementById('bio-count');
const nameErr      = document.getElementById('name-err');
const nameTaken    = document.getElementById('name-taken');
const btnSave      = document.getElementById('btn-save');
const toast        = document.getElementById('toast');
const goalPreview  = document.getElementById('goal-preview');
const memberSince  = document.getElementById('member-since');
const avatarIcon   = document.getElementById('avatar-icon');

// ── Time helpers ──────────────────────────────────────────────────────────
function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'h ' + String(m).padStart(2,'0') + 'm';
  return m > 0 ? m + 'm' : '0m';
}

// ── Load profile ──────────────────────────────────────────────────────────
async function loadProfile() {
  try {
    const res  = await fetch(API_GET(MY_NAME));
    const data = await res.json();

    inputName.value = data.name  || MY_NAME;
    inputGoal.value = data.goal  || '';
    inputBio.value  = data.bio   || '';

    // counters
    nameCount.textContent  = inputName.value.length + '/24';
    goalCount.textContent  = inputGoal.value.length + '/200';
    bioCount.textContent   = inputBio.value.length  + '/300';

    // stats
    document.getElementById('stat-total').textContent   = fmtTime(data.total_secs   || 0);
    document.getElementById('stat-weekly').textContent  = fmtTime(data.weekly_secs  || 0);
    document.getElementById('stat-sessions').textContent = String(data.session_count || 0);

    // goal preview
    if (data.goal) {
      goalPreview.textContent = data.goal;
      goalPreview.classList.remove('empty');
    }

    // avatar initials
    avatarIcon.textContent = '[' + (data.name || MY_NAME).slice(0,1).toUpperCase() + ']';

    // member since
    if (data.created_at) {
      const d = new Date(data.created_at * 1000);
      memberSince.textContent = 'Member since ' + d.toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
    }
  } catch {
    // non-critical — just show empty form
  }
}

// ── Live char counters ────────────────────────────────────────────────────
inputName.addEventListener('input', () => {
  nameCount.textContent = inputName.value.length + '/24';
  nameErr.classList.remove('visible');
  nameTaken.classList.remove('visible');
  inputName.classList.remove('err');
});
inputGoal.addEventListener('input', () => {
  goalCount.textContent = inputGoal.value.length + '/200';
  goalPreview.textContent = inputGoal.value || 'No goal set yet. Add one in the form →';
  goalPreview.classList.toggle('empty', !inputGoal.value);
});
inputBio.addEventListener('input', () => {
  bioCount.textContent = inputBio.value.length + '/300';
});

// ── Save ──────────────────────────────────────────────────────────────────
btnSave.addEventListener('click', async () => {
  const newName = inputName.value.trim();

  if (newName.length < 2 || newName.length > 24 || !/^[a-zA-Z0-9_\- ]+$/.test(newName)) {
    inputName.classList.add('err');
    nameErr.classList.add('visible');
    inputName.focus();
    return;
  }

  btnSave.disabled = true;
  btnSave.textContent = 'SAVING…';

  try {
    const res  = await fetch(API_PUT, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        oldName: MY_NAME,
        newName: newName,
        bio:     inputBio.value.trim(),
        goal:    inputGoal.value.trim(),
      }),
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 409) {
        inputName.classList.add('err');
        nameTaken.classList.add('visible');
        inputName.focus();
      }
      return;
    }

    MY_NAME = data.name;
    localStorage.setItem('sl_name', MY_NAME);
    avatarIcon.textContent = '[' + MY_NAME.slice(0,1).toUpperCase() + ']';

    // Show toast
    toast.classList.remove('visible');
    void toast.offsetWidth;  // reflow to restart animation
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2600);

    // Reload stats with new name
    loadProfile();
  } catch {
    alert('Could not save — is the server running?');
  } finally {
    btnSave.disabled = false;
    btnSave.textContent = 'SAVE CHANGES';
  }
});

// ── Init ──────────────────────────────────────────────────────────────────
loadProfile();
</script>

</body>
</html>
